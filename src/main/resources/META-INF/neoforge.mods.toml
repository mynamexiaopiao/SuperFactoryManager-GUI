modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
logoFile="logo.png"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

# This addon requires Super Factory Manager to be installed.
[[dependencies.${mod_id}]]
modId="sfm"
type="required"
versionRange="[4.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="AFTER"
side="BOTH"

# Optional JEI integration: when present, the resource picker uses JEI's item list
# and renderer. Load after JEI (client only) so our plugin's runtime is ready.
[[dependencies.${mod_id}]]
modId="jei"
type="optional"
versionRange="[19.0,)"
ordering="AFTER"
side="CLIENT"

